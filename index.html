<!doctype html>
<!--
[PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
INPUT: Browser loads this static page from localhost.
OUTPUT: Full-viewport Siri-style WebGL scene with accessible status text.
POS: Root entry point; script order wires shader, renderer, audio, and app state.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glass Voice Orb Study</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./src/styles.css?v=29" />
  </head>
  <body>
    <main class="siri-page">
      <canvas id="siri-canvas" class="siri-canvas" aria-label="Glass voice orb visual effect"></canvas>
      <div id="siri-dialog" class="siri-dialog" aria-hidden="true">
        <form id="siri-ask" class="siri-ask" autocomplete="off">
          <input
            id="siri-input"
            type="text"
            placeholder="Ask Siri"
            maxlength="160"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            enterkeyhint="send"
            aria-label="Ask Siri"
          />
          <span class="siri-mic" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 14.5a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Z"/>
              <path d="M5 10.8a7 7 0 0 0 14 0M12 18v4M8.5 22h7"/>
            </svg>
          </span>
        </form>
        <p id="siri-answer" class="siri-answer" aria-live="polite"></p>
      </div>
      <button id="siri-control" class="siri-control" type="button">Hold to speak</button>
      <p id="siri-status" class="sr-only" aria-live="polite">Idle.</p>
    </main>

    <script defer src="./src/tuner.js?v=29"></script>
    <script defer src="./src/backgrounds.js?v=29"></script>
    <script defer src="./src/shaders.js?v=29"></script>
    <script defer src="./src/pipeline.js?v=29"></script>
    <script defer src="./src/uniforms.js?v=29"></script>
    <script defer src="./src/state.js?v=29"></script>
    <script defer src="./src/audio.js?v=29"></script>
    <script defer src="./src/renderer.js?v=29"></script>
    <script defer src="./src/main.js?v=29"></script>
  </body>
</html>
